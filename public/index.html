<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <h1>Personal Finance</h1>
    </header>

    <!-- Dashboard -->
    <section class="dashboard" id="dashboard">
      <div class="card" id="card-balance">
        <span class="card-label">Total Balance</span>
        <span class="card-value" id="total-balance">—</span>
      </div>
      <div class="card" id="card-income">
        <span class="card-label">Income This Month</span>
        <span class="card-value" id="monthly-income">—</span>
      </div>
      <div class="card" id="card-expenses">
        <span class="card-label">Expenses This Month</span>
        <span class="card-value" id="monthly-expenses">—</span>
      </div>
    </section>

    <!-- Add Transaction Form -->
    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-row type-toggle">
          <label class="radio-label">
            <input type="radio" name="type" value="income" /> Income
          </label>
          <label class="radio-label">
            <input type="radio" name="type" value="expense" checked /> Expense
          </label>
        </div>

        <div class="form-row">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="0.00" required />
          <span class="field-error" id="amount-error"></span>
        </div>

        <div class="form-row">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">Select category</option>
            <option value="Salary">Salary</option>
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-row">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" required />
        </div>

        <div class="form-row">
          <label for="note">Note <span class="optional">(optional)</span></label>
          <input type="text" id="note" name="note" maxlength="100" placeholder="Short description…" />
        </div>

        <div class="form-row checkbox-row">
          <label class="checkbox-label">
            <input type="checkbox" id="recurring" name="recurring" />
            Mark as Recurring
          </label>
        </div>

        <button type="submit" class="btn-primary">Add Transaction</button>
      </form>
    </section>

    <!-- Transaction List -->
    <section class="list-section">
      <h2>Transactions</h2>
      <div id="transaction-list">
        <p class="empty-state">No transactions yet. Add one above.</p>
      </div>
    </section>
  </div>

  <!-- Confirm Delete Dialog -->
  <div class="overlay hidden" id="confirm-overlay">
    <div class="dialog">
      <p>Are you sure you want to delete this transaction?</p>
      <div class="dialog-actions">
        <button class="btn-danger" id="confirm-delete-btn">Delete</button>
        <button class="btn-secondary" id="cancel-delete-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
